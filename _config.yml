# GitHub Pages Configuration for SIH Documentation

# Theme - just-the-docs provides sidebar navigation, search, and documentation layout
remote_theme: just-the-docs/just-the-docs@v0.10.1

# Site info
title: SIH - Supervisao Industrial Halal
description: Sistema de Supervisao Industrial Halal - Documentacao Oficial

# Repository Info
repository: Ecohalal/sih-docs
url: https://ecohalal.github.io
baseurl: /sih-docs

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Theme color scheme
color_scheme: light

# Aux links (top right corner)
aux_links:
  "GitHub":
    - "https://github.com/Ecohalal/sih-docs"

# Footer
footer_content: "SIH - Supervisao Industrial Halal &copy; 2026 FAMBRAS Halal"

# Back to top link
back_to_top: true
back_to_top_text: "Voltar ao topo"

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-include-cache

# Relative links settings
relative_links:
  enabled: true
  collections: true

# Exclude files from build
exclude:
  - test-slaughter-report.pdf
  - CLAUDE.md
  - .claude/
  - "*.pdf"
